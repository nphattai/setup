          - RS-Lead: multica/docs/templates/rs-lead.tmpl.md
          - RS-Builder: multica/docs/templates/rs-builder.tmpl.md
          - RS-Reviewer: multica/docs/templates/rs-reviewer.tmpl.md
          - RS-QA: multica/docs/templates/rs-qa.tmpl.md
          - RS-Research: multica/docs/templates/rs-research.tmpl.md
      - Skills:

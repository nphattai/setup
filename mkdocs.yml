# Docs site for ~/Work/setup — renders all published .md + Mermaid diagrams, deploys to GitHub Pages.
# Build:  pip install -r requirements-docs.txt && mkdocs serve   (preview at http://127.0.0.1:8000)
# Deploy: pushed to main -> .github/workflows/docs.yml builds and publishes to the gh-pages branch.

site_name: setup — multi-agent dev workspace
site_description: Engines (infra · agent-memory), the Multica squad template, and concrete projects — one navigable, diagrammed reference.

site_url: https://nphattai.github.io/setup/
repo_url: https://github.com/nphattai/setup
repo_name: nphattai/setup
edit_uri: edit/main/

# Source docs live in-place across the repo root (engines/template/projects each keep their own docs/).
# docs_dir = repo root so existing relative cross-links keep resolving and nothing is duplicated.
# mkdocs-same-dir lets docs_dir equal the config's own directory (MkDocs forbids that by default).
docs_dir: .
plugins:
  - search
  - same-dir

# Keep build output and non-doc material out of the site (docs_dir is the whole repo root).
# NOTE: nav must stay .md-only — the file-type globs below also exclude non-.md files from being
# copied as dead-weight static assets, so adding a .yml/.sh/etc. page to nav would fail the build.
exclude_docs: |
  /site/
  plans/
  .github/
  **/node_modules/
  agent-memory/data/
  agent-memory/agentmemory-home/
  **/*.db
  **/.env*
  **/Dockerfile*
  **/*.sh
  **/*.yaml
  **/*.yml

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: README.md
  - Architecture: ARCHITECTURE.md

  - Infra (engine):
      - Overview: infra/README.md
      - High-level design: infra/docs/design/highlevel-design.md

          - Overview: projects/aaa/README.md
          - Infra integration: projects/aaa/integration.md
          - Squad:
              - Setup & order: projects/aaa/squad/README.md
              - Constitution: projects/aaa/squad/00-squad-constitution.md
              - RS-Lead: projects/aaa/squad/rs-lead.md
              - RS-Builder: projects/aaa/squad/rs-builder.md
              - RS-Reviewer: projects/aaa/squad/rs-reviewer.md

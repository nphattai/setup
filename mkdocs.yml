          - root-cause-first: multica/skills/root-cause-first/SKILL.md
          - safe-refactor: multica/skills/safe-refactor/SKILL.md
      - Env notes: multica/env/README.md
      - Docker notes: multica/docker/README.md
      - Archive:
          - Working-model design (superseded): multica/docs/archive/multica-working-model-design.md
          - Infina insurance setup (superseded): multica/docs/archive/multica-infina-insurance-setup.md

  - Agent Memory (engine):
      - Overview: agent-memory/README.md
      - Architecture: agent-memory/docs/architecture.md
      - Runbook: agent-memory/docs/runbook.md
      - LLM backend: agent-memory/docs/llm-backend.md
      - MCP shim: agent-memory/mcp/README.md
      - Decisions:
          - ADR 0001 — Antigravity OAuth via CLIProxyAPI: agent-memory/docs/decisions/0001-use-antigravity-oauth-via-cliproxyapi.md
          - ADR 0002 — remove gemini-proxy: agent-memory/docs/decisions/0002-remove-gemini-proxy.md
          - ADR 0003 — ClaudeProbe & worktree hook fixes: agent-memory/docs/decisions/0003-claudeprobe-and-worktree-hook-fixes.md
          - ADR 0004 — relocate setup & fresh store: agent-memory/docs/decisions/0004-relocate-setup-and-fresh-store.md

  - Projects:

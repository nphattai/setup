# Build the MkDocs site and publish it to the gh-pages branch on every push to main.
# One-time GitHub setup: Settings -> Pages -> Source = "Deploy from a branch" -> branch "gh-pages" / root.
name: Docs

on:
  push:
    branches: [main]
    # Skip rebuilds when nothing that affects the site changed.
    paths:
      - "**/*.md"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Serialize deploys so two quick pushes can't race force-pushes to gh-pages.
concurrency:
  group: docs-deploy
  cancel-in-progress: true

permissions:
  contents: write # mkdocs gh-deploy pushes the built site to the gh-pages branch

env:
  # mkdocs-same-dir bundles an advisory log line that --strict would treat as an error; silence it.
  DISABLE_MKDOCS_2_WARNING: "true"

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gh-deploy can update gh-pages

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - run: pip install -r requirements-docs.txt

      - name: Build (strict — fail on broken links/nav)
        run: mkdocs build --strict

      - name: Deploy to gh-pages
        run: mkdocs gh-deploy --force --no-history
